stages:
  - validate
  - plan
  - apply

# Use official HashiCorp Terraform Docker image
image:
  name: hashicorp/terraform:latest
  entrypoint: [""]

# Initialize Terraform backend before running any stage
before_script:
  - terraform init

# Stage 1: Validate code syntax
validate_code:
  stage: validate
  script:
    - terraform validate

# Stage 2: Calculate plan diffs and store execution artifact
plan_changes:
  stage: plan
  script:
    - terraform plan -out=tfplan
  artifacts:
    name: "tfplan-$CI_COMMIT_SHA"
    paths:
      - tfplan
    expire_in: 1 week

# Stage 3: Apply infrastructure/policy updates to Azure
apply_changes:
  stage: apply
  script:
    - terraform apply -auto-approve tfplan
  dependencies:
    - plan_changes
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual  # Generates a safety approval button in GitLab UI!